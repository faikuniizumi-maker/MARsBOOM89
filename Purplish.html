<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #1a0033, #2d1b69, #6a4c93, #b185db);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* FALLING CHIBIS */
    .falling-chibis {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .chibi {
      position: absolute;
      width: 50px;
      height: 50px;
      animation: fall linear infinite;
      opacity: 0.8;
    }

    @keyframes fall {
      0% {
        transform: translateY(-100px) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      90% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* STARS */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .star {
      position: absolute;
      width: 40px;
      height: 40px;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
      50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
    }

    /* INTRO */
    #intro {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, #1a0033, #4a148c, #6a1b9a, #8e24aa);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: transform 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    #intro.fall-away {
      transform: translateY(100vh);
    }

    #intro h1 {
      font-family: 'Pacifico', cursive;
      font-size: 3.5rem;
      color: #e9d5ff;
      text-shadow: 0 0 40px rgba(232, 121, 249, 0.9), 0 0 80px rgba(179, 136, 255, 0.6);
      animation: pulse 2s ease-in-out infinite;
      margin-bottom: 30px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    #playMusic {
      padding: 15px 35px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(135deg, #d946ef, #a855f7, #7c3aed);
      color: #e9d5ff;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 5px 30px rgba(216, 70, 239, 0.6);
      transition: transform 0.2s;
    }

    #playMusic:hover {
      transform: scale(1.1);
    }

    /* MAIN CONTENT */
    .content {
      display: none;
      position: relative;
      z-index: 2;
      padding: 40px 20px;
    }

    .content.show {
      display: block;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* CARD */
    .card {
      max-width: 900px;
      margin: 0 auto;
      background: transparent;
      padding: 40px;
      border-radius: 30px;
      text-align: center;
    }

    .person-img {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 5px 30px rgba(177, 133, 219, 0.5);
      margin-bottom: 20px;
    }

    .card h2 {
      font-family: 'Pacifico', cursive;
      font-size: 2.5rem;
      color: #e9d5ff;
      text-shadow: 0 0 20px rgba(177, 133, 219, 0.8);
      margin-bottom: 15px;
    }

    .instruction {
      color: #ddd6fe;
      font-size: 1.2rem;
      margin-bottom: 20px;
      font-weight: 500;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 30px;
      margin-top: 40px;
      position: relative;
      min-height: 400px;
    }

    .gift-container {
      text-align: center;
      position: relative;
    }

    .gift {
      width: 100%;
      height: 200px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(177, 133, 219, 0.4), rgba(139, 92, 246, 0.4));
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 5px 20px rgba(139, 92, 246, 0.3);
    }

    .gift.playful {
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .gift:hover:not(.revealed) {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(139, 92, 246, 0.6);
    }

    .gift::before {
      content: '🎁';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 5rem;
      transition: opacity 0.3s;
      filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
    }

    .gift.shaking::before {
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
      25% { transform: translate(-50%, -50%) rotate(-10deg); }
      75% { transform: translate(-50%, -50%) rotate(10deg); }
    }

    .gift.revealed::before {
      opacity: 0;
    }

    .gift.revealed {
      background-size: cover;
      background-position: center;
      cursor: default;
      border: 3px solid rgba(255, 255, 255, 0.4);
    }

    .message {
      font-family: 'Pacifico', cursive;
      font-size: 1.2rem;
      color: #e9d5ff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
      opacity: 0;
      margin-top: 15px;
      transition: opacity 0.5s;
    }

    .message.show {
      opacity: 1;
    }

    .attempts {
      color: #f0abfc;
      font-size: 1rem;
      margin-top: 8px;
      min-height: 25px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    /* MOBILE */
    @media (max-width: 600px) {
      #intro h1 {
        font-size: 2.5rem;
      }

      .card {
        padding: 25px;
        margin: 20px;
      }

      .card h2 {
        font-size: 2rem;
      }

      .person-img {
        width: 150px;
        height: 150px;
      }

      .gift {
        height: 160px;
      }

      .gift::before {
        font-size: 4rem;
      }
    }
  </style>
</head>
<body>
  <!-- FALLING CHIBIS -->
  <div class="falling-chibis" id="chibisContainer"></div>

  <!-- STARS -->
  <div class="stars" id="starsContainer"></div>

  <!-- INTRO -->
  <div id="intro">
    <h1>Happy Birthday! 🎉</h1>
    <!-- Reveal sound effects -->
    <audio id="revealSound1" preload="auto">
      <source src="duck.mp3" type="audio/mpeg">
    </audio>
    <audio id="revealSound2" preload="auto">
      <source src="duck.mp3" type="audio/mpeg">
    </audio>
    <audio id="revealSound3" preload="auto">
      <source src="duck.mp3" type="audio/mpeg">
    </audio>
    <audio id="revealSound4" preload="auto">
      <source src="duck.mp3" type="audio/mpeg">
    </audio>
    <button id="playMusic">Tap to Start 🎵</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content" id="content">
    <!-- MEMORIES CARD -->
    <div class="card">
      <img src="pose.jpg" alt="Birthday Person" class="person-img">
      <h2>Ghar MEMES ✨</h2>
      <p class="instruction">
        🎮 Catch the playful gifts to reveal our memories! Some might run away... 😄
      </p>
      <div class="gallery" id="gallery">
        <div class="gift-container">
          <div class="gift playful" data-image="bal.png" data-message="Me after Nursing 💉" data-attempts="0"></div>
          <div class="message"></div>
          <div class="attempts"></div>
        </div>
        <div class="gift-container">
          <div class="gift playful" data-image="torture.png" data-message="Urge to torture you 😈" data-attempts="0"></div>
          <div class="message"></div>
          <div class="attempts"></div>
        </div>
        <div class="gift-container">
          <div class="gift" data-image="ZZzz.png" data-message="Zzzzzz 😴" data-attempts="0"></div>
          <div class="message"></div>
          <div class="attempts"></div>
        </div>
        <div class="gift-container">
          <div class="gift playful" data-image="Nomnom.png" data-message="Cannibal, tsk tsk 🍖" data-attempts="0"></div>
          <div class="message"></div>
          <div class="attempts"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Chibi images (with background removal)
    const penguinSVG = `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Penguin body -->
      <ellipse cx="100" cy="130" rx="45" ry="55" fill="#5B4E8C"/>
      <!-- Belly -->
      <ellipse cx="100" cy="135" rx="30" ry="40" fill="#E8F4F8"/>
      <ellipse cx="100" cy="155" rx="25" ry="20" fill="#A8E6E3"/>
      <!-- Head -->
      <circle cx="100" cy="65" r="40" fill="#6B5B95"/>
      <!-- Eyes -->
      <circle cx="85" cy="60" r="12" fill="white"/>
      <circle cx="115" cy="60" r="12" fill="white"/>
      <circle cx="88" cy="62" r="8" fill="#2C3E50"/>
      <circle cx="118" cy="62" r="8" fill="#2C3E50"/>
      <circle cx="90" cy="60" r="3" fill="white"/>
      <circle cx="120" cy="60" r="3" fill="white"/>
      <!-- Beak -->
      <polygon points="100,75 90,85 110,85" fill="#F39C12"/>
      <!-- Headphones -->
      <rect x="60" y="50" width="8" height="30" rx="4" fill="#4A4A4A"/>
      <rect x="132" y="50" width="8" height="30" rx="4" fill="#4A4A4A"/>
      <path d="M 68 50 Q 100 35 132 50" stroke="#4A4A4A" stroke-width="5" fill="none"/>
      <!-- Wings -->
      <ellipse cx="60" cy="130" rx="15" ry="35" fill="#4E4780" transform="rotate(-20 60 130)"/>
      <ellipse cx="140" cy="130" rx="15" ry="35" fill="#4E4780" transform="rotate(20 140 130)"/>
      <!-- Feet -->
      <ellipse cx="85" cy="185" rx="12" ry="8" fill="#F39C12"/>
      <ellipse cx="115" cy="185" rx="12" ry="8" fill="#F39C12"/>
    </svg>`;

    const alienSVG = `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Alien head -->
      <ellipse cx="100" cy="80" rx="50" ry="45" fill="#8B5CF6"/>
      <!-- Body -->
      <path d="M 70 110 Q 70 140 75 160 L 85 180 L 100 185 L 115 180 L 125 160 Q 130 140 130 110 Z" fill="#9F7AEA"/>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
      </linearGradient>
      <path d="M 70 110 Q 70 140 75 160 L 85 180 L 100 185 L 115 180 L 125 160 Q 130 140 130 110 Z" fill="url(#bodyGrad)"/>
      <!-- Eyes -->
      <ellipse cx="80" cy="75" rx="15" ry="20" fill="#1F2937"/>
      <ellipse cx="120" cy="75" rx="15" ry="20" fill="#1F2937"/>
      <ellipse cx="82" cy="70" rx="5" ry="7" fill="white" opacity="0.6"/>
      <ellipse cx="122" cy="70" rx="5" ry="7" fill="white" opacity="0.6"/>
      <!-- Nose holes -->
      <circle cx="95" cy="90" r="3" fill="#6B46C1"/>
      <circle cx="105" cy="90" r="3" fill="#6B46C1"/>
      <!-- Arms -->
      <ellipse cx="55" cy="130" rx="12" ry="30" fill="#9F7AEA" transform="rotate(-30 55 130)"/>
      <ellipse cx="145" cy="130" rx="12" ry="30" fill="#9F7AEA" transform="rotate(30 145 130)"/>
      <!-- Legs -->
      <ellipse cx="85" cy="185" rx="10" ry="8" fill="#A78BFA"/>
      <ellipse cx="115" cy="185" rx="10" ry="8" fill="#A78BFA"/>
    </svg>`;

    // Create falling chibis
    const chibisContainer = document.getElementById('chibisContainer');
    
    function createChibi() {
      const chibi = document.createElement('div');
      chibi.className = 'chibi';
      
      // Randomly choose penguin or alien
      chibi.innerHTML = Math.random() > 0.5 ? penguinSVG : alienSVG;
      
      // Random horizontal position
      chibi.style.left = Math.random() * 100 + '%';
      
      // Random animation duration (10-20 seconds)
      const duration = 10 + Math.random() * 10;
      chibi.style.animationDuration = duration + 's';
      
      // Random delay
      chibi.style.animationDelay = Math.random() * 5 + 's';
      
      // Random size (40-60px)
      const size = 40 + Math.random() * 20;
      chibi.style.width = size + 'px';
      chibi.style.height = size + 'px';
      
      chibisContainer.appendChild(chibi);
      
      // Remove after animation completes
      setTimeout(() => {
        chibi.remove();
        createChibi(); // Create a new one
      }, (duration + parseFloat(chibi.style.animationDelay)) * 1000);
    }
    
    // Create initial chibis
    for (let i = 0; i < 12; i++) {
      createChibi();
    }

    // Create floating stars
    const starsContainer = document.getElementById('starsContainer');
    const starSVG = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 10 L60 40 L90 40 L65 60 L75 90 L50 70 L25 90 L35 60 L10 40 L40 40 Z" 
            fill="white" stroke="white" stroke-width="2"/>
    </svg>`;

    for (let i = 0; i < 6; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.innerHTML = starSVG;
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      star.style.opacity = 0.5 + Math.random() * 0.5;
      starsContainer.appendChild(star);
    }

    // Music and intro handling
    const intro = document.getElementById('intro');
    const content = document.getElementById('content');
    const playBtn = document.getElementById('playMusic');

    playBtn.addEventListener('click', () => {
      setTimeout(() => {
        intro.classList.add('fall-away');
        setTimeout(() => {
          intro.style.display = 'none';
          content.classList.add('show');
        }, 1500);
      }, 2000);
    });

    // Chase the Gift Game Logic
    const gallery = document.getElementById('gallery');
    const allGifts = document.querySelectorAll('.gift');

    allGifts.forEach(gift => {
      if (gift.classList.contains('playful')) {
        let attempts = 0;
        const maxAttempts = 3;
        const attemptsDiv = gift.nextElementSibling.nextElementSibling;

        gift.addEventListener('click', function() {
          if (!this.classList.contains('revealed') && attempts < maxAttempts) {
            attempts++;
            this.dataset.attempts = attempts;

            this.classList.add('shaking');
            setTimeout(() => this.classList.remove('shaking'), 500);

            const containers = gallery.querySelectorAll('.gift-container');
            const availableContainers = Array.from(containers).filter(c => {
              const g = c.querySelector('.gift');
              return !g.classList.contains('revealed');
            });

            if (availableContainers.length > 1 && attempts < maxAttempts) {
              attemptsDiv.textContent = `😜 Almost! Try ${maxAttempts - attempts} more time${maxAttempts - attempts > 1 ? 's' : ''}!`;
              
              const currentContainer = this.parentElement;
              const randomContainer = availableContainers[Math.floor(Math.random() * availableContainers.length)];
              
              if (randomContainer !== currentContainer) {
                const currentGift = currentContainer.querySelector('.gift');
                const randomGift = randomContainer.querySelector('.gift');
                
                const tempGift = currentGift.cloneNode(true);
                const tempRandomGift = randomGift.cloneNode(true);
                
                currentContainer.querySelector('.gift').replaceWith(tempRandomGift);
                randomContainer.querySelector('.gift').replaceWith(tempGift);
                
                setupGiftEvents();
              }
            } else if (attempts >= maxAttempts) {
              attemptsDiv.textContent = '😊 Okay, I\'ll stay still now!';
              // Reveal on next click
              const giftToReveal = this;
              setTimeout(() => {
                giftToReveal.addEventListener('click', function revealClick() {
                  if (!giftToReveal.classList.contains('revealed')) {
                    console.log('Revealing gift with sound:', giftToReveal.dataset.sound);
                    revealGift(giftToReveal);
                    giftToReveal.removeEventListener('click', revealClick);
                  }
                });
              }, 100);
            }
          }
        });
      } else {
        gift.addEventListener('click', function() {
          if (!this.classList.contains('revealed')) {
            console.log('Revealing non-playful gift with sound:', this.dataset.sound);
            revealGift(this);
          }
        });
      }
    });

    function setupGiftEvents() {
      const gifts = document.querySelectorAll('.gift');
      gifts.forEach(gift => {
        const newGift = gift.cloneNode(true);
        gift.replaceWith(newGift);
      });
      
      document.querySelectorAll('.gift').forEach(gift => {
        if (gift.classList.contains('playful')) {
          let attempts = parseInt(gift.dataset.attempts) || 0;
          const maxAttempts = 3;
          const attemptsDiv = gift.nextElementSibling.nextElementSibling;

          gift.addEventListener('click', function() {
            if (!this.classList.contains('revealed') && attempts < maxAttempts) {
              attempts++;
              this.dataset.attempts = attempts;

              this.classList.add('shaking');
              setTimeout(() => this.classList.remove('shaking'), 500);

              const containers = gallery.querySelectorAll('.gift-container');
              const availableContainers = Array.from(containers).filter(c => {
                const g = c.querySelector('.gift');
                return !g.classList.contains('revealed');
              });

              if (availableContainers.length > 1 && attempts < maxAttempts) {
                attemptsDiv.textContent = `😜 Almost! Try ${maxAttempts - attempts} more time${maxAttempts - attempts > 1 ? 's' : ''}!`;
                
                const currentContainer = this.parentElement;
                const randomContainer = availableContainers[Math.floor(Math.random() * availableContainers.length)];
                
                if (randomContainer !== currentContainer) {
                  const currentGift = currentContainer.querySelector('.gift');
                  const randomGift = randomContainer.querySelector('.gift');
                  
                  const tempGift = currentGift.cloneNode(true);
                  const tempRandomGift = randomGift.cloneNode(true);
                  
                  currentContainer.querySelector('.gift').replaceWith(tempRandomGift);
                  randomContainer.querySelector('.gift').replaceWith(tempGift);
                  
                  setupGiftEvents();
                }
              } else if (attempts >= maxAttempts) {
                attemptsDiv.textContent = '😊 Okay, I\'ll stay still now!';
                // Reveal on next click
                const giftToReveal = this;
                setTimeout(() => {
                  giftToReveal.addEventListener('click', function revealClick() {
                    if (!giftToReveal.classList.contains('revealed')) {
                      console.log('Revealing playful gift with sound:', giftToReveal.dataset.sound);
                      revealGift(giftToReveal);
                      giftToReveal.removeEventListener('click', revealClick);
                    }
                  });
                }, 100);
              }
            }
          });
        } else {
          gift.addEventListener('click', function() {
            if (!this.classList.contains('revealed')) {
              console.log('Revealing normal gift with sound:', this.dataset.sound);
              revealGift(this);
            }
          });
        }
      });
    }

    function revealGift(giftElement) {
      const image = giftElement.dataset.image;
      const message = giftElement.dataset.message;
      const messageDiv = giftElement.nextElementSibling;
      const attemptsDiv = messageDiv.nextElementSibling;

      giftElement.style.backgroundImage = `url('${image}')`;
      giftElement.classList.add('revealed');
      messageDiv.textContent = message;
      messageDiv.classList.add('show');
      attemptsDiv.textContent = '';
      
      // Play sound based on which image is revealed
      let soundId = null;
      if (image === 'bal.png') soundId = 'revealSound1';
      else if (image === 'torture.png') soundId = 'revealSound2';
      else if (image === 'ZZzz.png') soundId = 'revealSound3';
      else if (image === 'Nomnom.png') soundId = 'revealSound4';
      
      if (soundId) {
        const sound = document.getElementById(soundId);
        if (sound) {
          console.log('Playing sound:', soundId, 'for image:', image);
          sound.currentTime = 0;
          sound.play()
            .then(() => console.log('✅ Sound played successfully!'))
            .catch(e => console.error('❌ Audio play failed:', e));
        } else {
          console.error('Sound element not found:', soundId);
        }
      } else {
        console.warn('No sound mapped for image:', image);
      }
    }
  </script>
</body>
</html>
